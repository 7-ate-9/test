layout: default

<style>
    :root {
        /* These will inherit from GitHub Pages theme if set, otherwise use defaults */
        --bg-primary: var(--color-canvas-default, #0d1117);
        --bg-secondary: var(--color-canvas-subtle, #161b22);
        --text-primary: var(--color-fg-default, #c9d1d9);
        --text-secondary: var(--color-fg-muted, #8b949e);
        --accent-color: var(--color-accent-emphasis, #58a6ff);
        --border-color: var(--color-border-default, #30363d);
    }

    .slideshow-container {
        max-width: 900px;
        width: 100%;
        position: relative;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        overflow: hidden;
        padding: 20px;
        margin: 20px auto;
    }

    .slide {
        display: none;
        width: 100%;
        min-height: 580px;
        position: relative;
    }

    .slide.active {
        display: block;
    }

    .slide iframe {
        width: 100%;
        height: 580px;
        border: none;
        display: block;
    }
    
    .slide {
        padding: 20px;
        background: white;
    }

    .loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        color: #666;
    }

    .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border-color);
        border-top: 3px solid var(--accent-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 10;
    }

    .control-btn {
        background: rgba(255,255,255,0.9);
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        font-size: 16px;
    }

    .control-btn:hover {
        background: white;
        transform: scale(1.1);
    }

    .timer-display {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 8px 12px;
        border-radius: 15px;
        font-size: 14px;
        z-index: 10;
        min-width: 40px;
        text-align: center;
    }

    .slide-counter {
        position: absolute;
        top: 60px;
        right: 20px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 8px 12px;
        border-radius: 15px;
        font-size: 14px;
        z-index: 10;
        min-width: 40px;
        text-align: center;
    }

    .fullscreen-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 8px 12px;
        border-radius: 15px;
        font-size: 18px;
        border: none;
        cursor: pointer;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .slideshow-container:hover .fullscreen-btn {
        opacity: 1;
    }

    .fullscreen-btn:hover {
        background: rgba(0,0,0,0.9);
    }

    .progress-bar {
        display: none;
    }

    .slide-counter {
        position: absolute;
        top: 20px;
        right: 20px;

    .title {
        text-align: center;

    .title h1 {

    .apply-filters-btn:hover {

    }

        color: #e74c3c;
    }

    @media (max-width: 768px) {
        .title h1 {
            font-size: 2em;
        }
        
        .slide iframe {
            height: 450px;
        }
        
        .slide {
            min-height: 450px;
        }

            max-width: 100%;
        }
        
        .filter-row {
            flex-direction: column;

   /* Fullscreen overlay styles */
    .fullscreen-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;

<div class="title">
    <h1>eBird Top Photos Slideshow</h1>
    <p>Top-rated bird photography from the past week</p>
</div>

<div class="filters">
    <div class="filter-row">
        <div class="filter-group">
            <label for="timerInput">Slide Duration (seconds)</label>
            <input type="number" id="timerInput" min="5" max="300" value="30" placeholder="30">
        </div>
        <button class="apply-filters-btn" id="applyFiltersBtn">Apply Timer</button>
    </div>
</div>

<div class="slideshow-container">
    <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
    
    <div id="slides-container">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Loading today's featured bird photos...</p>
        </div>
    </div>
    
    <div class="controls" id="controls" style="display: none;">
        <button class="control-btn" id="prevBtn">‹</button>
        <button class="control-btn" id="playPauseBtn">⏸️</button>
        <button class="control-btn" id="nextBtn">›</button>
    </div>
    
    <div class="slide-counter" id="slideCounter" style="display: none;"></div>
    <div class="timer-display" id="timerDisplay" style="display: none;">30s</div>
</div>

<script>
    class BirdSlideshow {
        constructor() {
            this.slides = [];
            this.currentSlide = 0;
            this.isPlaying = true;
            this.interval = null;
            this.slideDuration = 30000;
            this.countdownInterval = null;
            this.timeRemaining = 30;
            this.hideTimeout = null;
            this.mouseMoveHandler = null;
            this.metadataCache = {}; // Cache metadata to avoid re-fetching
            
            this.init();
            this.setupFullscreenListeners();
        }

        async init() {
            this.setupFilterControls();
            await this.loadAssets();
            this.setupControls();
            if (this.slides.length > 0) {
                this.startSlideshow();
            }
        }

        setupFilterControls() {
            const applyBtn = document.getElementById('applyFiltersBtn');
            const timerInput = document.getElementById('timerInput');

            applyBtn.addEventListener('click', () => {
                const newDuration = parseInt(timerInput.value) || 30;
                this.slideDuration = newDuration * 1000;
                this.timeRemaining = newDuration;
                
                if (this.isPlaying && this.slides.length > 0) {
                    clearInterval(this.interval);
                    clearInterval(this.countdownInterval);
                    this.timeRemaining = newDuration;
                    this.updateTimerDisplay();
                    this.startCountdown();
                    this.interval = setInterval(() => this.nextSlide(), this.slideDuration);
                }
            });
        }

        async loadAssets() {
            try {
                const response = await fetch('assets.json');
                let assetNumbers;
                
                if (response && response.ok) {
                    const data = await response.json();
                    assetNumbers = data.assets;
                } else {
                    assetNumbers = [
                        '121689041', '642398752', '638399431', '644382546',
                        '265530851', '644309560', '621907936', '646501597'
                    ];
                }

                this.createSlides(assetNumbers);
            } catch (error) {
                console.error('Error loading assets:', error);
                this.showError('Failed to load bird photos.');
            }
        }

        createSlides(assetNumbers) {
            const container = document.getElementById('slides-container');
            container.innerHTML = '';
            this.slides = [];

            assetNumbers.forEach((assetNumber, index) => {
                const slide = document.createElement('div');
                slide.className = `slide ${index === 0 ? 'active' : ''}`;
                slide.dataset.assetNumber = assetNumber; // Store for fullscreen use
                
                const iframe = document.createElement('iframe');
                iframe.src = `https://macaulaylibrary.org/asset/${assetNumber}/embed/640`;
                iframe.width = '100%';
                iframe.height = '580';
                iframe.frameBorder = '0';
                iframe.loading = 'lazy';
                iframe.allowFullscreen = true;
                
                if (window.innerWidth <= 768) {
                    iframe.height = '450';
                }
                
                slide.appendChild(iframe);
                container.appendChild(slide);
                this.slides.push(slide);
            });

            document.getElementById('controls').style.display = 'flex';
            document.getElementById('slideCounter').style.display = 'block';
            document.getElementById('timerDisplay').style.display = 'block';
            this.updateCounter();
        }

       async fetchAssetMetadata(assetNumber) {
        // Check cache first
        if (this.metadataCache[assetNumber]) {
            return this.metadataCache[assetNumber];
        }
    
        try {
            // Use a CORS proxy to fetch the page
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://macaulaylibrary.org/asset/${assetNumber}`)}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            const html = data.contents;
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Extract metadata - trying multiple selectors
            const speciesElement = doc.querySelector('h1') || doc.querySelector('[class*="Species"]');
            const speciesText = speciesElement?.textContent?.trim() || '';
            
            // Split species name if it contains scientific name
            let commonName = speciesText;
            let scientificName = '';
            
            // Look for italic text (usually scientific name)
            const italicElement = speciesElement?.querySelector('em') || speciesElement?.querySelector('i');
            if (italicElement) {
                scientificName = italicElement.textContent.trim();
                commonName = speciesText.replace(scientificName, '').trim();
            }
            
            // Try to find photographer
            const photographerElement = doc.querySelector('a[href*="/profile/"]') || 
                                       doc.querySelector('[class*="photographer"]') ||
                                       doc.querySelector('[class*="user"]');
            const photographer = photographerElement?.textContent?.trim() || 'Unknown Photographer';
            
            // Try to find date
            const dateElement = doc.querySelector('time') || 
                              doc.querySelector('[class*="date"]');
            const date = dateElement?.textContent?.trim() || dateElement?.getAttribute('datetime') || '';
            
            // Try to find location
            const locationElement = doc.querySelector('[class*="location"]') || 
                                  doc.querySelector('[class*="place"]');
            const location = locationElement?.textContent?.trim() || 'Unknown Location';
    
            const metadata = {
                species: commonName || 'Bird Species',
                scientificName: scientificName,
                photographer: photographer,
                date: date,
                location: location,
                catalogNumber: `ML ${assetNumber}`
            };
    
            // Cache it
            this.metadataCache[assetNumber] = metadata;
            console.log('Extracted metadata:', metadata); // Debug
            return metadata;
        } catch (error) {
            console.error('Error fetching metadata:', error);
            // Return fallback metadata
            return {
                species: 'Bird Species',
                scientificName: '',
                photographer: 'Photographer',
                date: '',
                location: 'Location',
                catalogNumber: `ML ${assetNumber}`
            };
        }
    }

        showError(message) {
            const container = document.getElementById('slides-container');
            container.innerHTML = `<div class="error"><h3>⚠️ ${message}</h3></div>`;
        }

        setupControls() {
            document.getElementById('prevBtn').addEventListener('click', () => this.previousSlide());
            document.getElementById('nextBtn').addEventListener('click', () => this.nextSlide());
            document.getElementById('playPauseBtn').addEventListener('click', () => this.togglePlayPause());
            document.getElementById('fullscreenBtn').addEventListener('click', () => this.toggleFullscreen());
        }

        setupFullscreenListeners() {
            ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange']
                .forEach(event => document.addEventListener(event, () => this.handleFullscreenChange()));
        }

        async handleFullscreenChange() {
            const container = document.querySelector('.slideshow-container');
            const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement || 
                                    document.mozFullScreenElement || document.msFullscreenElement);
            
            if (isFullscreen) {
                await this.enterFullscreenMode();
            } else {
                this.exitFullscreenMode();
            }
        }

      async enterFullscreenMode() {
        const container = document.querySelector('.slideshow-container');
        const activeSlide = container.querySelector('.slide.active');
        const assetNumber = activeSlide.dataset.assetNumber;
        
        // Hide iframe
        const iframe = activeSlide.querySelector('iframe');
        if (iframe) iframe.style.display = 'none';
        
        // Create fullscreen overlay with just the image
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-overlay';
        overlay.innerHTML = `
            <img src="https://cdn.download.ams.birds.cornell.edu/api/v2/asset/${assetNumber}/1200" 
                 alt="Bird Photo" 
                 class="fullscreen-image">
        `;
        
        activeSlide.appendChild(overlay);
        
        container.style.cssText = 'background: #000; padding: 0;';
        activeSlide.style.cssText = 'padding: 0; background: #000; height: 100vh;';
        
        this.hideControlsOnIdle();
    }

        exitFullscreenMode() {
            const container = document.querySelector('.slideshow-container');
            const activeSlide = container.querySelector('.slide.active');
            
            // Remove fullscreen overlay
            const overlay = activeSlide.querySelector('.fullscreen-overlay');
            if (overlay) overlay.remove();
            
            // Show iframe again
            const iframe = activeSlide.querySelector('iframe');
            if (iframe) {
                iframe.style.display = 'block';
                iframe.style.cssText = 'height: 580px; width: 100%;';
            }
            
            container.style.cssText = '';
            activeSlide.style.cssText = '';
            
            // Show all controls
            ['controls', 'timerDisplay', 'slideCounter', 'fullscreenBtn'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.opacity = '';
            });
            
            // Clean up listeners
            if (this.mouseMoveHandler) {
                container.removeEventListener('mousemove', this.mouseMoveHandler);
                this.mouseMoveHandler = null;
            }
            clearTimeout(this.hideTimeout);
        }

        hideControlsOnIdle() {
            const container = document.querySelector('.slideshow-container');
            const elements = ['controls', 'timerDisplay', 'slideCounter', 'fullscreenBtn']
                .map(id => document.getElementById(id));
            
            const hideControls = () => {
                if (document.fullscreenElement) {
                    elements.forEach(el => el.style.opacity = '0');
                }
            };
            
            const showControls = () => {
                elements.forEach(el => {
                    el.style.opacity = '1';
                    el.style.transition = 'opacity 0.3s ease';
                });
                clearTimeout(this.hideTimeout);
                this.hideTimeout = setTimeout(hideControls, 2000);
            };
            
            // Remove old listener if exists
            if (this.mouseMoveHandler) {
                container.removeEventListener('mousemove', this.mouseMoveHandler);
            }
            
            this.mouseMoveHandler = showControls;
            container.addEventListener('mousemove', this.mouseMoveHandler);
            this.hideTimeout = setTimeout(hideControls, 2000);
        }

        toggleFullscreen() {
            const container = document.querySelector('.slideshow-container');
            
            if (!document.fullscreenElement) {
                container.requestFullscreen?.() || 
                container.webkitRequestFullscreen?.() || 
                container.msRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || 
                document.webkitExitFullscreen?.() || 
                document.msExitFullscreen?.();
            }
        }

        startSlideshow() {
            if (this.slides.length === 0) return;
            
            this.showSlide(0);
            if (this.isPlaying) {
                this.startCountdown();
                this.interval = setInterval(() => this.nextSlide(), this.slideDuration);
            }
        }

        showSlide(index) {
            this.slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
            this.currentSlide = index;
            this.updateCounter();
            
            // If in fullscreen, update the fullscreen view
            if (document.fullscreenElement) {
                this.exitFullscreenMode();
                setTimeout(() => this.enterFullscreenMode(), 100);
            }
        }

        nextSlide() {
            const nextIndex = (this.currentSlide + 1) % this.slides.length;
            this.showSlide(nextIndex);
            this.timeRemaining = this.slideDuration / 1000;
            this.updateTimerDisplay();
            if (this.isPlaying) {
                clearInterval(this.countdownInterval);
                this.startCountdown();
            }
        }

        previousSlide() {
            const prevIndex = (this.currentSlide - 1 + this.slides.length) % this.slides.length;
            this.showSlide(prevIndex);
            this.timeRemaining = this.slideDuration / 1000;
            this.updateTimerDisplay();
            if (this.isPlaying) {
                clearInterval(this.countdownInterval);
                this.startCountdown();
            }
        }

        togglePlayPause() {
            const playPauseBtn = document.getElementById('playPauseBtn');
            
            if (this.isPlaying) {
                this.isPlaying = false;
                clearInterval(this.interval);
                clearInterval(this.countdownInterval);
                playPauseBtn.textContent = '▶️';
            } else {
                this.isPlaying = true;
                this.timeRemaining = this.slideDuration / 1000;
                this.updateTimerDisplay();
                this.startCountdown();
                this.interval = setInterval(() => this.nextSlide(), this.slideDuration);
                playPauseBtn.textContent = '⏸️';
            }
        }

        startCountdown() {
            this.timeRemaining = this.slideDuration / 1000;
            this.updateTimerDisplay();
            this.countdownInterval = setInterval(() => {
                this.timeRemaining -= 1;
                if (this.timeRemaining < 0) this.timeRemaining = 0;
                this.updateTimerDisplay();
            }, 1000);
        }

        updateTimerDisplay() {
            const timerDisplay = document.getElementById('timerDisplay');
            if (timerDisplay) {
                timerDisplay.textContent = `${Math.ceil(this.timeRemaining)}s`;
            }
        }

        updateCounter() {
            const counter = document.getElementById('slideCounter');
            counter.textContent = `${this.currentSlide + 1} / ${this.slides.length}`;
        }
    }

    document.addEventListener('DOMContentLoaded', () => new BirdSlideshow());
</script>
